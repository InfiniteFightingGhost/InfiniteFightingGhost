<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 330" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d14" />
      <stop offset="50%" stop-color="#0e131f" />
      <stop offset="100%" stop-color="#151b26" />
    </linearGradient>

    <!-- Blueprint Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.07" />
    </pattern>

    <!-- Transition Line Gradient -->
    <linearGradient id="transitionLineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0" />
      <stop offset="15%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#a7f3d0" stop-opacity="1" />
      <stop offset="85%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>

    <!-- Transition Masks -->
    <!-- Solid Mask: Opaque on the right (X > 210), transitions from black to white between X=130 and X=290 -->
    <linearGradient id="maskGrad" x1="130" y1="0" x2="290" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="black" />
      <stop offset="100%" stop-color="white" />
    </linearGradient>
    <mask id="solidMask">
      <rect x="0" y="0" width="850" height="330" fill="url(#maskGrad)" />
    </mask>

    <!-- Wireframe Mask: Opaque on the left (X < 130), transitions from white to black between X=130 and X=290 -->
    <linearGradient id="maskGradInv" x1="130" y1="0" x2="290" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" />
      <stop offset="100%" stop-color="black" />
    </linearGradient>
    <mask id="wireframeMask">
      <rect x="0" y="0" width="850" height="330" fill="url(#maskGradInv)" />
    </mask>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Global Styles */
    .bg { fill: url(#bgGrad); }
    .grid-bg { fill: url(#grid); }
    .scanline { stroke: url(#transitionLineGrad); stroke-width: 1.5; filter: url(#neonGlow); }
    
    /* Code Elements */
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; fill: #10b981; opacity: 0.15; }
    .opcode { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #a7f3d0; opacity: 0.25; font-weight: bold; }
    .watermark-code { font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px; fill: #10b981; opacity: 0.05; }
    
    /* Wireframe Crane Styles */
    .wireframe-group polygon {
      fill: #10b981;
      fill-opacity: 0.02;
      stroke: #a7f3d0;
      stroke-width: 1.2;
      stroke-opacity: 0.45;
    }
    .wireframe-group .crease-dash {
      stroke-dasharray: 3,3;
      stroke-opacity: 0.25;
    }
    
    /* Solid Crane Styles (with Shaded Mint Gradients) */
    .solid-group { filter: url(#neonGlow); }
    .facet-back-wing { fill: #047857; stroke: #6ee7b7; stroke-width: 0.5; }
    .facet-tail-1 { fill: #059669; stroke: #a7f3d0; stroke-width: 0.5; }
    .facet-tail-2 { fill: #10b981; stroke: #a7f3d0; stroke-width: 0.5; }
    .facet-body-back { fill: #064e3b; stroke: #34d399; stroke-width: 0.5; }
    .facet-body-front { fill: #047857; stroke: #6ee7b7; stroke-width: 0.5; }
    .facet-chest { fill: #065f46; stroke: #34d399; stroke-width: 0.5; }
    .facet-neck-1 { fill: #10b981; stroke: #a7f3d0; stroke-width: 0.5; }
    .facet-neck-2 { fill: #047857; stroke: #6ee7b7; stroke-width: 0.5; }
    .facet-head-1 { fill: #34d399; stroke: #a7f3d0; stroke-width: 0.5; }
    .facet-head-2 { fill: #059669; stroke: #6ee7b7; stroke-width: 0.5; }
    .facet-front-wing-1 { fill: #6ee7b7; stroke: #e6fffa; stroke-width: 0.5; }
    .facet-front-wing-2 { fill: #34d399; stroke: #a7f3d0; stroke-width: 0.5; }
    
    /* Technical Dots and Connections */
    .node-dot { fill: #a7f3d0; opacity: 0.6; filter: url(#neonGlow); }
    .node-line { stroke: #10b981; stroke-width: 1; opacity: 0.2; }
    
    /* Text styles */
    .title-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 44px; font-weight: 800; fill: #e6fffa; letter-spacing: -1px; }
    .subtitle-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 600; fill: #34d399; letter-spacing: 2px; }
  </style>

  <!-- Background Layer -->
  <rect width="850" height="330" class="bg" />
  <rect width="850" height="330" class="grid-bg" />

  <!-- Code Watermark / Background Elements -->
  <!-- Left Stack Trace -->
  <text x="30" y="50" class="code-text">0x08F0 : A 0e07bfc1b56b 0x04B60</text>
  <text x="30" y="68" class="code-text">0x08F0 : A 0567cf9a1600 0x04FF0 02 00E</text>
  <text x="30" y="86" class="code-text">0x10A0 : B 0100d692863c 0x04FF0 02 00D</text>
  <text x="30" y="104" class="code-text">0x10A0 : B 01000f22f500 0x07FF0 02 80D</text>
  
  <!-- Left Opcodes -->
  <text x="30" y="240" class="opcode">OP_LOAD_SHEET</text>
  <text x="30" y="258" class="opcode">OP_CREASE_AXIS</text>
  <text x="30" y="276" class="opcode">OP_FOLD_TRIANGLE</text>
  <text x="30" y="294" class="opcode">OP_IGNITE_SOUL</text>

  <!-- Right Code Watermark -->
  <text x="440" y="70" class="watermark-code">import { fold, animate } from 'origami-core';</text>
  <text x="440" y="90" class="watermark-code">const ghost = new FightingGhost.Soul();</text>
  <text x="440" y="240" class="watermark-code">const sheet = new Paper({ color: '#a7f3d0' });</text>
  <text x="440" y="260" class="watermark-code">const machine = ghost.breatheInto(fold(sheet));</text>
  <text x="440" y="280" class="watermark-code">machine.execute(); // awakening the system</text>

  <!-- Abstract Syntax Tree / Node Connections (Right Side Background) -->
  <g class="ast-group">
    <line x1="720" y1="120" x2="680" y2="160" class="node-line" />
    <line x1="720" y1="120" x2="760" y2="160" class="node-line" />
    <line x1="680" y1="160" x2="650" y2="210" class="node-line" />
    <line x1="680" y1="160" x2="710" y2="210" class="node-line" />
    <line x1="760" y1="160" x2="790" y2="210" class="node-line" />
    
    <circle cx="720" cy="120" r="4" class="node-dot" />
    <circle cx="680" cy="160" r="4" class="node-dot" />
    <circle cx="760" cy="160" r="4" class="node-dot" />
    <circle cx="650" cy="210" r="3" class="node-dot" />
    <circle cx="710" cy="210" r="3" class="node-dot" />
    <circle cx="790" cy="210" r="3" class="node-dot" />

    <text x="730" y="124" font-family="monospace" font-size="9" fill="#10b981" opacity="0.3">Root</text>
    <text x="772" y="164" font-family="monospace" font-size="9" fill="#10b981" opacity="0.3">Fold</text>
  </g>

  <!-- Technical grid/layout helper line -->
  <line x1="70" y1="165" x2="380" y2="165" stroke="#10b981" stroke-width="0.5" stroke-dasharray="5,10" opacity="0.15" />

  <!-- === THE ORIGAMI CRANE === -->

  <!-- Layer 1: Wireframe/Blueprint Crane (Left-dominant via mask) -->
  <g class="wireframe-group" mask="url(#wireframeMask)">
    <!-- Left Wing (Background) -->
    <polygon points="220,150 250,45 245,175" />
    
    <!-- Tail -->
    <polygon points="245,175 335,95 275,160" />
    <polygon points="220,150 335,95 245,175" />
    
    <!-- Body Back -->
    <polygon points="220,150 245,175 205,195" />
    
    <!-- Body Center/Front -->
    <polygon points="220,150 205,195 205,160" />
    <polygon points="205,160 205,195 155,175" />
    
    <!-- Neck -->
    <polygon points="155,175 110,125 205,160" />
    <polygon points="155,175 110,125 205,195" />
    
    <!-- Head / Beak -->
    <polygon points="110,125 85,135 100,145" />
    <polygon points="110,125 100,145 155,175" />
    
    <!-- Right Wing (Foreground) -->
    <polygon points="205,195 185,275 245,175" />
    <polygon points="220,150 185,275 245,175" />
    
    <!-- Crease Guideline details (only on wireframe) -->
    <line x1="85" y1="135" x2="220" y2="150" class="crease-dash" stroke="#a7f3d0" stroke-width="0.8" />
    <line x1="110" y1="125" x2="155" y2="175" class="crease-dash" stroke="#a7f3d0" stroke-width="0.8" />
    <line x1="185" y1="275" x2="220" y2="150" class="crease-dash" stroke="#a7f3d0" stroke-width="0.8" />
  </g>

  <!-- Layer 2: Glowing 3D Solid Crane (Right-dominant via mask) -->
  <g class="solid-group" mask="url(#solidMask)">
    <!-- Left Wing (Background) -->
    <polygon points="220,150 250,45 245,175" class="facet-back-wing" />
    
    <!-- Tail -->
    <polygon points="245,175 335,95 275,160" class="facet-tail-1" />
    <polygon points="220,150 335,95 245,175" class="facet-tail-2" />
    
    <!-- Body Back -->
    <polygon points="220,150 245,175 205,195" class="facet-body-back" />
    
    <!-- Body Center/Front -->
    <polygon points="220,150 205,195 205,160" class="facet-body-front" />
    <polygon points="205,160 205,195 155,175" class="facet-chest" />
    
    <!-- Neck -->
    <polygon points="155,175 110,125 205,160" class="facet-neck-1" />
    <polygon points="155,175 110,125 205,195" class="facet-neck-2" />
    
    <!-- Head / Beak -->
    <polygon points="110,125 85,135 100,145" class="facet-head-1" />
    <polygon points="110,125 100,145 155,175" class="facet-head-2" />
    
    <!-- Right Wing (Foreground) -->
    <polygon points="205,195 185,275 245,175" class="facet-front-wing-1" />
    <polygon points="220,150 185,275 245,175" class="facet-front-wing-2" />
  </g>

  <!-- The Scanning / Transition Divide Line -->
  <line x1="210" y1="35" x2="210" y2="295" class="scanline" />
  
  <!-- Tiny scanning dot indicators -->
  <circle cx="210" cy="90" r="2.5" fill="#a7f3d0" filter="url(#neonGlow)" />
  <circle cx="210" cy="220" r="2.5" fill="#a7f3d0" filter="url(#neonGlow)" />

  <!-- === PROFILE TEXT === -->
  <g transform="translate(440, 155)">
    <!-- Sleek Neon Header -->
    <text x="0" y="0" class="title-text" filter="url(#neonGlow)">InfiniteFightingGhost</text>
    
    <!-- Subtitle with letter spacing -->
    <text x="0" y="32" class="subtitle-text">FOLDING CODE • BREATHING LIFE</text>
  </g>

</svg>
